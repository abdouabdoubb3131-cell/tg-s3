services:
  # CF Worker 部署服务 (一次性, 由 ./deploy.sh 编排调用)
  # 不会随 docker compose up 自动启动, 需通过 deploy profile 显式调用
  deploy:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    env_file: .env
    volumes:
      - ./.env:/app/.env
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-${CF_ACCOUNT_ID:-}}
    restart: "no"
    profiles:
      - deploy

  # Telegram Local Bot API: 解除文件大小限制 (20MB -> 2GB)
  # 需要 TELEGRAM_API_ID 和 TELEGRAM_API_HASH (从 https://my.telegram.org 获取)
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - tg-bot-api-data:/var/lib/telegram-bot-api
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - localapi

  # VPS 本地处理服务 (大文件 + 媒体处理)
  # Tunnel 和 Caddy 均通过 Docker 内部网络访问, 无需暴露宿主机端口
  # 调试时如需直连: docker compose run -p 3000:3000 processor
  processor:
    build: ./processor
    restart: unless-stopped
    environment:
      - PORT=3000
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - AUTH_SECRET=${VPS_SECRET}
      - TG_LOCAL_API=${TG_LOCAL_API:-https://api.telegram.org}
      - DEFAULT_CHAT_ID=${DEFAULT_CHAT_ID}
      - TEMP_DIR=/tmp/tg-s3
    volumes:
      - processor-data:/tmp/tg-s3
    deploy:
      resources:
        limits:
          memory: 2G

  # Cloudflare Tunnel: 安全暴露 processor 给 CF Worker, 无需开放公网端口
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - processor
    profiles:
      - tunnel

volumes:
  processor-data:
  tg-bot-api-data:
